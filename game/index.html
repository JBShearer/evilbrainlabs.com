<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Product Generator | Evil Brain Labs</title>
    <link rel="icon" type="image/jpeg" href="/images/logo.jpg">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div class="scanlines"></div>

    <div class="game-wrapper">
        <!-- Header -->
        <header class="game-header">
            <div class="header-content">
                <h1>🧠 EVIL BRAIN LABS</h1>
                <p class="subtitle">Employee Interface v3.7</p>
                <p class="job-title" id="job-title">Synthetic Intelligence Trainee</p>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">ABSURDISM</span>
                <span class="stat-value" id="stat-absurdism">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">PROFESSIONALISM</span>
                <span class="stat-value" id="stat-professionalism">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">CHAOS</span>
                <span class="stat-value" id="stat-chaos">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">LOOPS</span>
                <span class="stat-value" id="stat-loops">0</span>
            </div>
        </div>

        <!-- Main Game Container -->
        <main class="game-container" id="game-wrapper">
            <!-- Graphics Display (Canvas) -->
            <div class="graphics-display" id="graphics-display">
                <!-- Canvas will be injected here -->
            </div>

            <!-- Narrative Text -->
            <div class="narrative-box">
                <div class="narrative-text" id="narrative-text">
                    <p>Initializing AI Product Generator...</p>
                </div>
            </div>

            <!-- Loopback Message (hidden by default) -->
            <div class="loopback-message" id="loopback-message" style="display: none;">
                <span class="glitch">⚠️ TEMPORAL ANOMALY DETECTED ⚠️</span>
            </div>

            <!-- Choices -->
            <div class="choices-container" id="choices-container">
                <!-- Choices will be injected here -->
            </div>

            <!-- Loading Indicator -->
            <div class="loading-indicator" id="loading-indicator" style="display: none;">
                <span class="loading-text">◐ Loading...</span>
            </div>
        </main>

        <!-- Timewaster Container (overlays main game when active) -->
        <div class="timewaster-overlay" id="timewaster-container" style="display: none;">
            <!-- Timewaster games will be rendered here -->
        </div>

        <!-- Inventory Panel -->
        <div class="inventory-panel" id="inventory-panel">
            <div class="inventory-header">
                <h3>📦 INVENTORY</h3>
                <span class="inventory-count"><span id="inventory-count">0</span>/20</span>
            </div>
            <div class="inventory-grid" id="inventory-grid">
                <!-- 20 inventory slots -->
            </div>
        </div>

        <!-- Message Board Panel -->
        <div class="message-board-panel" id="message-board-panel">
            <div id="message-board">
                <!-- Company message board will be rendered here -->
            </div>
        </div>

        <!-- Company Store Panel (hidden by default) -->
        <div class="company-store-panel" id="company-store-panel" style="display: none;">
            <!-- Store will be rendered here -->
        </div>

        <!-- Recycling & Crafting Panel (hidden by default) -->
        <div class="recycling-panel" id="recycling-panel" style="display: none;">
            <!-- Recycling station will be rendered here -->
        </div>

        <!-- Vending Machine Panel (hidden by default) -->
        <div class="vending-machine-panel" id="vending-machine-panel" style="display: none;">
            <!-- Vending machine will be rendered here -->
        </div>

        <!-- Employee Evaluation Panel (hidden by default) -->
        <div class="evaluation-panel" id="evaluation-panel" style="display: none;">
            <!-- Evaluations will be rendered here -->
        </div>

        <!-- Controls Footer -->
        <footer class="game-controls">
            <button class="control-btn" id="btn-eval" title="Employee Evaluations">
                📋 Tests
            </button>
            <button class="control-btn" id="btn-vending" title="Vending Machine">
                🏪 Vending
            </button>
            <button class="control-btn" id="btn-recycle" title="Recycling & Crafting">
                ♻️ Recycle
            </button>
            <button class="control-btn" id="btn-save" title="Save Game">
                💾 Save
            </button>
            <button class="control-btn" id="btn-achievements" title="View Achievements">
                🏆 Achievements (<span id="achievement-count">0</span>)
            </button>
            <button class="control-btn" id="btn-restart" title="Restart Game">
                🔄 Restart
            </button>
            <button class="control-btn" id="btn-sound" title="Toggle Sound">
                🔊 Sound: <span id="sound-status">ON</span>
            </button>
        </footer>
    </div>

    <!-- Achievement Notification -->
    <div class="achievement-notification" id="achievement-notification" style="display: none;">
        <div class="achievement-content">
            <span class="achievement-icon">🏆</span>
            <div class="achievement-text">
                <div class="achievement-title" id="achievement-title">Achievement Unlocked!</div>
                <div class="achievement-desc" id="achievement-desc">Description here</div>
            </div>
        </div>
    </div>

    <!-- Save/Load Modal -->
    <div class="modal" id="save-load-modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close" id="modal-close">&times;</span>
            <h2 id="modal-title">Save Game</h2>
            <div class="save-slots" id="save-slots">
                <!-- Save slots will be injected here -->
            </div>
        </div>
    </div>

    <!-- Achievements Modal -->
    <div class="modal" id="achievements-modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close" id="achievements-close">&times;</span>
            <h2>Achievements</h2>
            <div class="achievements-list" id="achievements-list">
                <!-- Achievements will be injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/graphicsEngine.js?v=12"></script>
    <script src="js/audioEngine.js?v=12"></script>
    <script src="js/saveManager.js?v=12"></script>
    <script src="js/achievements.js?v=12"></script>
    <script src="js/contentLoader.js?v=12"></script>
    <script src="js/jobTitleSystem.js?v=12"></script>
    <script src="js/inventorySystem.js?v=12"></script>
    <script src="js/messageBoardSystem.js?v=12"></script>
    <script src="js/companyMessageBoard.js?v=12"></script>
    <script src="js/productGenerator.js?v=12"></script>
    <script src="js/companyStore.js?v=12"></script>
    <script src="js/vendingMachine.js?v=12"></script>
    <script src="js/recyclingSystem.js?v=12"></script>
    <script src="js/employeeEvaluator.js?v=12"></script>
    <script src="js/timewasterEngine.js?v=12"></script>
    <script src="js/gameEngine.js?v=12"></script>
</body>
</html>
